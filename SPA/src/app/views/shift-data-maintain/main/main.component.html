<div class="card">
  <div class="card-header">
    <div class="row">
      <div class="col-md-10">
        <h5>Shift Data Maintain</h5>
      </div>
      <div class="col-md-2"></div>
    </div>
    <div class="row">
      <div class="col-md-2">
        <span class="badge badge-warning">Shift</span>
        <input type="text" name="shift"  class="form-control" [(ngModel)]="param.shift">
      </div>
      <div class="col-md-2">
        <span class="badge badge-warning">Shift Name</span>
        <input type="text" name="shift-name"  class="form-control" [(ngModel)]="param.shift_Name">
      </div>
      <div class="col pt-4">
        <button class="btn btn-primary" (click)="search()"> Search</button>
        <button class="btn btn-success" (click)="add()"> Add</button>
      </div>
    </div>
  </div>

  <table class="table table-bordered">
    <thead>
      <tr>
        <th scope="col"></th>
        <th scope="col">Shift</th>
        <th scope="col">Name of Shift</th>
      </tr>
    </thead>

    <tbody >
      <tr *ngFor="let msshift of data ">
          <td> {{msshift.manuf}}</td>
          <td> {{msshift.shift}}</td>
          <td> {{msshift.shiftName}}</td>
      </tr>
      


    </tbody>
  </table>
  <pagination [boundaryLinks]="true" [totalItems]="pagination.totalCount" [(ngModel)]="pagination.pageNumber"
      (pageChanged)="pageChanged($event)"  >
  <span class="cs-page ml-2"> Page - {{pagination.pageNumber}} /
        {{pagination.totalPage}}</span>
 
</pagination>
</div>
