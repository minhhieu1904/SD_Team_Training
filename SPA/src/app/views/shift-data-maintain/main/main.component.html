<div class="card">
  <div class="card-header">
    <div class="row">
      <div class="col-md-10">
        <h5>Shift Data Maintain</h5>
      </div>
      <div class="col-md-2"></div>
    </div>
    <div class="row">
      <div class="col-md-2">
        <span class="badge badge-warning">Shift</span>
        <input type="text" name="shift"  class="form-control" [(ngModel)]="model.shift">
      </div>
      <div class="col-md-2">
        <span class="badge badge-warning">Shift Name</span>
        <input type="text" name="shift-name"  class="form-control" [(ngModel)]="model.shiftName">
      </div>
      <div class="col pt-4">
        <button class="btn btn-primary" (click)="search()"> Search</button>
      </div>
    </div>
  </div>

  <table class="table table-bordered">
    <thead>
      <tr>
        <th scope="col"></th>
        <th scope="col">Shift</th>
        <th scope="col">Name of Shift</th>
      </tr>
    </thead>

    <tbody *ngFor="let msshift of model">
      <tr>
          <th> {{msshift.manuf}}</th>
          <th> {{msshift.shift}}</th>
          <th> {{msshift.shiftName}}</th>
      </tr>


    </tbody>

  </table>
</div>
